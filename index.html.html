<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños Fafiux</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial, sans-serif;
    overflow:hidden;
    padding:20px;
}

.card{
    width:100%;
    max-width:500px;
    background:white;
    border-radius:20px;
    padding:35px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,.15);
    transition:1s;
    z-index:10;
}

h1{
    color:#ff4081;
    font-size:clamp(2rem,5vw,3rem);
    margin-bottom:15px;
}

p{
    color:#444;
    font-size:1.1rem;
    line-height:1.6;
}

button{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#ff4081;
    color:white;
    font-size:1rem;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.sorpresa{
    display:none;
    animation:aparecer 1s ease;
}

.sorpresa img{
    width:100%;
    max-width:320px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.sorpresa h2{
    color:#ff4081;
    margin-bottom:15px;
}

@keyframes aparecer{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* CONFETI */
.confeti{
    position:fixed;
    width:12px;
    height:12px;
    top:-20px;
    pointer-events:none;
    z-index:1;
    animation:caer linear infinite;
}

@keyframes caer{
    from{transform:translateY(-100px) rotate(0deg);}
    to{transform:translateY(110vh) rotate(720deg);}
}
</style>
</head>

<body>

<div class="card">

    <div id="inicio">

        <h1>Feliz Cumpleaños Fafiux</h1>

        <p>
            Hoy es un día especial y quería prepararte algo
            para recordarte lo increíble que eres
        </p>

        <button onclick="abrirSorpresa()">
            Abrir sorpresa
        </button>

    </div>

    <div class="sorpresa" id="sorpresa">

       <img src="bng.png" alt="Foto de Fafiux">

        <h2>Para Fafiux</h2>

        <p>
           felizes 24 añacos, eres increible, eres super maja, linda, divertida,etc... te mereces lo mejor hoy y siempre, te quiere montxo <3
        </p>

    </div>

</div>

<!-- AUDIO (SOLO UNA VEZ) -->
<audio id="musica">
    <source src="melan.m4a" type="audio/mp4">
</audio>

<script>

let musicaReproducida = false;

function crearConfeti(){

    for(let i=0;i<150;i++){

        let confeti = document.createElement("div");

        confeti.classList.add("confeti");

        confeti.style.left = Math.random() * 100 + "vw";

        confeti.style.backgroundColor =
        `hsl(${Math.random()*360},100%,50%)`;

        confeti.style.animationDuration =
        (Math.random()*3 + 3) + "s";

        confeti.style.animationDelay =
        Math.random()*2 + "s";

        document.body.appendChild(confeti);
    }
}

// intentar sonar al cargar (si el navegador lo permite)
window.addEventListener("load", () => {
    const audio = document.getElementById("musica");

    if (!musicaReproducida) {
        audio.play().then(() => {
            musicaReproducida = true;
        }).catch(() => {});
    }
});

function abrirSorpresa(){

    document.getElementById("inicio").style.display = "none";
    document.getElementById("sorpresa").style.display = "block";

    crearConfeti();

    const audio = document.getElementById("musica");

    if (!musicaReproducida) {
        audio.play().then(() => {
            musicaReproducida = true;
        }).catch(() => {});
    }
}

</script>

</body>
</html>
